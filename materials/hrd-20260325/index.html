<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD Presentation - 2026-03-25</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="../../assets/img/favicons/favicon.ico">


  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- PDF Generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="presentation" id="presentation">
    <!-- Header -->
    <div class="presentation-header">
      <div class="slide-indicator">
        <span class="current-slide">1</span> / <span class="total-slides">0</span>
      </div>
      <div class="header-actions">
        <!-- Temporarily hidden -->
        <button class="header-btn download-btn" id="download-pdf" aria-label="Download PDF">
          <i class="fa-solid fa-download"></i>
        </button>
       
        <button class="header-btn theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
          <i class="fa-solid fa-sun"></i>
        </button>
        <button class="header-btn fullscreen-btn" id="fullscreen-btn" aria-label="Toggle fullscreen">
          <i class="fa-solid fa-expand"></i>
        </button>
      </div>
    </div>

    <!-- Slides (dynamically rendered from slides.json) -->
    <div class="slides-container" id="slides-container">
      <div class="loading-spinner"></div>
    </div>

    <!-- Navigation -->
    <div class="navigation">
      <button class="nav-btn nav-prev" id="nav-prev" aria-label="Previous slide">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <button class="nav-btn nav-next" id="nav-next" aria-label="Next slide">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>

    <!-- Keyboard Hint -->
    <div class="keyboard-hint">
      <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> Navigate</span>
      <span><kbd>F</kbd> Fullscreen</span>
    </div>

    <!-- Slide Jump -->
    <div class="slide-jump">
      <span>Go to:</span>
      <input type="number" id="slide-jump-input" min="1" placeholder="#">
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/presentation.js"></script>
</body>

</html>
